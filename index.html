<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>おすすめ本ジェネレータ</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5f5f5;
  font-family: sans-serif;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 12px;
  width: 90%;
  max-width: 700px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  font-size: 16px;
}

#result {
  margin-top: 20px;
  text-align: left;
  line-height: 1.6;
}

.footer {
  margin-top: 30px;
  font-size: 14px;
}

.footer a {
  color: black;
  text-decoration: none;
  margin: 0 10px;
}
</style>

<!-- ▼ Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBC1xSpVO66BjEQWg0LY3DMprR8OnVA1Qc",
  authDomain: "book-recommender-44749.firebaseapp.com",
  projectId: "book-recommender-44749",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.collection = collection;
</script>

</head>

<body>

<div class="container">

<h2>おすすめ本ジェネレータ</h2>
<p>好きな本を5冊入力してね</p>

<input id="b1" list="books">
<input id="b2" list="books">
<input id="b3" list="books">
<input id="b4" list="books">
<input id="b5" list="books">

<datalist id="books"></datalist>

<button onclick="recommend()">おすすめを見る</button>

<div id="result"></div>

<div class="footer">
  <a href="about.html">About</a> |
  <a href="privacy.html">Privacy</a>
</div>

</div>

<script>

let users = [
  ["明暗","ねじまき鳥クロニクル","海辺のカフカ","1Q84","ノルウェイの森"],
  ["グレート・ギャツビー","日はまた昇る","武器よさらば","老人と海"],
  ["ねじまき鳥クロニクル","海辺のカフカ","世界の終りとハードボイルドワンダーランド"],
  ["明暗","こころ","坊っちゃん","吾輩は猫である"]
];

// サジェスト
const allBooks = [...new Set(users.flat())];
const datalist = document.getElementById("books");

allBooks.forEach(book => {
  let option = document.createElement("option");
  option.value = book;
  datalist.appendChild(option);
});

// ▼ レコメンド（Firebase対応）
async function recommend(){

  let input = [
    b1.value, b2.value, b3.value, b4.value, b5.value
  ].filter(v => v !== "");

  // Firebaseから取得
  const snapshot = await getDocs(collection(db, "books"));
  snapshot.forEach(doc => {
    users.push(doc.data().list);
  });

  let scores = {};

  users.forEach(user => {
    let match = user.filter(book => input.includes(book)).length;

    if(match > 0){
      user.forEach(book => {
        if(!input.includes(book)){
          scores[book] = (scores[book] || 0) + match;
        }
      });
    }
  });

  let sorted = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,25);

  let html = "";
  sorted.forEach(([book,score])=>{
    html += book + " ("+score+")<br>";
  });

  document.getElementById("result").innerHTML = html || "候補が足りないかも";

  // Firebaseに保存
  await addDoc(collection(db, "books"), {
    list: input
  });
}

</script>

</body>
</html>
