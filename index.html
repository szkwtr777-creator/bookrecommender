<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Recommender</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5f5f5;
  font-family: sans-serif;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 90%;
  max-width: 700px;
  text-align: center;
}

/* ② タイトル2倍 */
.title {
  font-size: 48px;
  font-weight: bold;
}

/* ② サブタイトル2倍 */
.subtitle {
  font-size: 32px;
  margin-top: 10px;
}

/* ルール */
.rules {
  text-align: left;
  margin: 20px 0;
  font-size: 14px;
}

.rules-title {
  font-weight: bold;
  margin-bottom: 5px;
}

/* ① 入力欄2倍 */
input {
  width: 100%;
  padding: 20px; /* ←ここで高さアップ */
  margin: 10px 0;
  font-size: 18px;
}

.suggestions {
  text-align: left;
  background: #eee;
}

.suggestions div {
  padding: 8px;
  cursor: pointer;
}

/* ボタン */
button {
  margin: 10px;
  padding: 12px 24px;
  font-size: 16px;
}

/* ③ ランキング文字 */
.small-text {
  font-size: 14px;
  line-height: 1.6;
}
</style>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBC1xSpVO66BjEQWg0LY3DMprR8OnVA1Qc",
  authDomain: "book-recommender-44749.firebaseapp.com",
  projectId: "book-recommender-44749",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.collection = collection;
</script>

</head>

<body>

<div class="container">

<div class="title">おすすめ本ジェネレータ</div>
<div class="subtitle">お気に入りの本を入力してね</div>

<div class="rules">
  <div class="rules-title">【ルール】</div>
  <div>・洋書は翻訳版の名前で入力してね</div>
  <div>・翻訳版が複数あった場合は一番上に表示されたものを入力してね</div>
  <div>・巻数が複数あるものは1巻を入力してね（シリーズモノはそれぞれ入力でOK）</div>
</div>

<div id="inputs"></div>

<button onclick="recommend()">おすすめ</button>
<button onclick="showStats()">人気ランキング</button>

<div id="result"></div>

<div style="margin-top:20px; font-size:14px;">
  <a href="about.html">About</a> |
  <a href="privacy.html">Privacy</a>
</div>

</div>

<script>

let selectedBooks = [];

// 入力欄生成
for(let i=0;i<5;i++){
  const wrapper = document.createElement("div");

  const input = document.createElement("input");
  input.placeholder = "本を検索";

  const suggest = document.createElement("div");
  suggest.className = "suggestions";

  input.addEventListener("input", async () => {
    const q = input.value;
    if(q.length < 2) return;

    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&langRestrict=ja`);
    const data = await res.json();

    suggest.innerHTML = "";

    data.items?.slice(0,5).forEach(item => {
      const info = item.volumeInfo;
      const title = info.title;
      const author = info.authors?.[0] || "";

      const div = document.createElement("div");
      div.innerText = title + " / " + author;

      div.onclick = () => {
        input.value = title;
        selectedBooks[i] = {
          title,
          author,
          id: item.id
        };
        suggest.innerHTML = "";
      };

      suggest.appendChild(div);
    });
  });

  wrapper.appendChild(input);
  wrapper.appendChild(suggest);
  document.getElementById("inputs").appendChild(wrapper);
}

// レコメンド
async function recommend(){

  let users = [];

  const snapshot = await getDocs(collection(db, "books"));
  snapshot.forEach(doc => {
    users.push(doc.data().list);
  });

  let scores = {};

  users.forEach(user => {
    let match = user.filter(b =>
      selectedBooks.some(s => s?.id === b.id)
    ).length;

    if(match > 0){
      user.forEach(book => {
        if(!selectedBooks.some(s => s?.id === book.id)){
          scores[book.title] = (scores[book.title] || 0) + match;
        }
      });
    }
  });

  let sorted = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,20);

  let html = "<h3>おすすめ</h3><div class='small-text'>";
  sorted.forEach(([title])=>{
    html += title + "<br>";
  });
  html += "</div>";

  document.getElementById("result").innerHTML = html || "候補が足りないかも";

  await addDoc(collection(db, "books"), {
    list: selectedBooks
  });
}

// ランキング
async function showStats(){
  const snapshot = await getDocs(collection(db, "books"));
  let count = {};

  snapshot.forEach(doc => {
    doc.data().list.forEach(book => {
      count[book.title] = (count[book.title] || 0) + 1;
    });
  });

  let sorted = Object.entries(count)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,10);

  let html = "<h3>人気ランキング</h3><div class='small-text'>";
  sorted.forEach(([title,c])=>{
    html += title + " (" + c + ")<br>";
  });
  html += "</div>";

  document.getElementById("result").innerHTML = html || "データがまだ少ない";
}

</script>

</body>
</html>
