<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>おすすめ本ジェネレータ</title>

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg,#1e1e2f,#2c2c54);
  color:white;
  text-align:center;
}

.container{
  max-width:400px;
  margin:80px auto;
  padding:30px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  backdrop-filter:blur(10px);
}

h2{
  margin-bottom:10px;
}

p{
  color:#aaa;
}

input{
  width:90%;
  padding:10px;
  margin:8px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  padding:12px 20px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#6c5ce7;
  color:white;
  font-weight:bold;
}

button:hover{
  opacity:0.8;
}

#result{
  margin-top:20px;
  text-align:left;
}
</style>

</head>

<body>

<div class="container">

<h2>おすすめ本ジェネレータ</h2>
<p>好きな本を5冊入力してね</p>

<input id="b1" list="books"><br>
<input id="b2" list="books"><br>
<input id="b3" list="books"><br>
<input id="b4" list="books"><br>
<input id="b5" list="books"><br>

<datalist id="books"></datalist>

<button onclick="recommend()">おすすめを見る</button>

<div id="result"></div>

</div>

<script>

const users = [
  ["明暗","ねじまき鳥クロニクル","海辺のカフカ","1Q84","ノルウェイの森"],
  ["グレート・ギャツビー","日はまた昇る","武器よさらば","老人と海"],
  ["ねじまき鳥クロニクル","海辺のカフカ","世界の終りとハードボイルドワンダーランド"],
  ["明暗","こころ","坊っちゃん","吾輩は猫である"],
  ["グレート・ギャツビー","華麗なるギャツビー","夜はやさし"],
  ["1Q84","ノルウェイの森","色彩を持たない多崎つくる"],
  ["ねじまき鳥クロニクル","スプートニクの恋人","ダンスダンスダンス"],
  ["明暗","三四郎","それから","門"],
  ["海辺のカフカ","風の歌を聴け","1973年のピンボール"],
  ["老人と海","誰がために鐘は鳴る"],
  ["こころ","夢十夜"],
  ["坊っちゃん","草枕"],
  ["1Q84","騎士団長殺し"],
  ["ノルウェイの森","国境の南、太陽の西"],
  ["グレート・ギャツビー","楽園のこちら側"]
];

const allBooks = [...new Set(users.flat())];
const datalist = document.getElementById("books");

allBooks.forEach(book => {
  let option = document.createElement("option");
  option.value = book;
  datalist.appendChild(option);
});

function recommend(){
  let input = [b1.value,b2.value,b3.value,b4.value,b5.value].filter(v=>v);

  let scores = {};

  users.forEach(user=>{
    let match = user.filter(book=>input.includes(book)).length;

    if(match>0){
      user.forEach(book=>{
        if(!input.includes(book)){
          scores[book]=(scores[book]||0)+match;
        }
      });
    }
  });

  let sorted = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,25);

  let html = "";
  sorted.forEach(([book,score])=>{
    html += "・"+book+"<br>";
  });

  document.getElementById("result").innerHTML =
    html || "候補がまだ少ないかも";
}

</script>

</body>
</html>
